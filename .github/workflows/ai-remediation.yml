name: AI Auto-Remediation v2

on:
  workflow_run:
    workflows: ["Claude AI Code Review"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
        default: ''
      max_files:
        description: 'Max files (default: 3)'
        required: false
        default: '3'

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: resolve-pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            let branchName = null;

            if (context.eventName === 'workflow_run') {
              const headBranch = context.payload.workflow_run.head_branch;
              console.log(`HEAD branch: ${headBranch}`);

              if (headBranch === 'main' || !headBranch) {
                console.log('SKIP: main branch');
                core.setOutput('skip', 'true');
                return;
              }

              if (context.payload.workflow_run.conclusion !== 'success') {
                console.log('SKIP: not success');
                core.setOutput('skip', 'true');
                return;
              }

              branchName = headBranch;

              const { data: result } = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} type:pr state:open head:${headBranch}`
              });
              if (result.total_count > 0) {
                prNumber = result.items[0].number;
              }
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number);
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('branch', branchName);
            core.setOutput('skip', 'false');

      - name: Checkout
        if: steps.resolve-pr.outputs.skip != 'true' && steps.resolve-pr.outputs.branch != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-pr.outputs.branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDK
        run: pip install claude-agent-sdk

      - name: Fetch Comments
        id: fetch-comments
        if: steps.resolve-pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = parseInt('${{ steps.resolve-pr.outputs.pr_number }}' || '0');
            const branch = '${{ steps.resolve-pr.outputs.branch }}';

            if (!prNumber && branch) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open'
              });
              if (prs.length > 0) prNumber = prs[0].number;
            }

            if (!prNumber) { core.setOutput('skip', 'true'); return; }

            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`total=${comments.length}`);
            if (comments.length > 0) {
              const c = comments[0];
              console.log('SAMPLE: user=' + (c.user && c.user.login) + ' path=' + c.path + ' line=' + c.line + ' body=' + (c.body || '').substring(0, 120));
            }

            // Keep only bot comments on code lines
            const matched = comments
              .filter(c => c.user && c.user.login === 'github-actions[bot]' && c.path && c.line)
              .map(c => ({
                location: { path: c.path, range: { start: { line: c.line } } },
                message: (c.body || '').trim().split('\n')[0] || 'fix this',
                severity: 'warning'
              }));

            console.log('matched=' + matched.length);
            if (matched.length > 0) {
              console.log('FIRST: ' + JSON.stringify(matched[0]));
            }

            core.setOutput('comments', JSON.stringify(matched));
            core.setOutput('count', matched.length);

      - name: Check Issues
        id: check-issues
        if: steps.resolve-pr.outputs.skip != 'true' && steps.fetch-comments.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const n = parseInt('${{ steps.fetch-comments.outputs.count }}' || '0');
            core.setOutput('skip', n === 0 ? 'true' : 'false');

      - name: Auto-Fix
        if: steps.check-issues.outputs.skip != 'true'
        id: auto-fix
        continue-on-error: true
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://coding.dashscope.aliyuncs.com/apps/anthropic' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'qwen3.5-plus' }}
          REVIEW_COMMENTS: ${{ steps.fetch-comments.outputs.comments }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        run: |
          python3 scripts/auto-fix.py > auto-fix-result.json 2>&1 || true
          cat auto-fix-result.json 2>/dev/null || echo '{"success":false}' > auto-fix-result.json

      - name: Push Fixes
        if: steps.auto-fix.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "AI auto-fix"
            git push origin HEAD:${{ steps.resolve-pr.outputs.branch }}
          fi
