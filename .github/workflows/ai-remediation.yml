name: AI Auto-Remediation

on:
  # ✅ 自动触发：AI Review 完成后触发
  workflow_run:
    workflows: ["Claude AI Code Review"]
    types:
      - completed
  
  # 手动触发（调试用）
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to fix'
        required: true
        default: ''
      max_files:
        description: 'Maximum files to fix (default: 3)'
        required: false
        default: '3'

permissions:
  pull-requests: write
  contents: write
  issues: read  # 用于 search API

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    
    steps:
      # ✅ 先获取 PR 号和分支名（用于 checkout 正确的分支）
      - name: Get PR Info (Auto or Manual)
        id: get-pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            let branchName = null;
            
            // ✅ workflow_run 自动触发
            if (context.eventName === 'workflow_run') {
              const conclusion = context.payload.workflow_run.conclusion;
              const headBranch = context.payload.workflow_run.head_branch;
              
              console.log(`Triggered by workflow_run (${conclusion})`);
              console.log(`Head Branch: ${headBranch}`);
              
              // 只处理成功的 review
              if (conclusion !== 'success') {
                console.log(`Skipping: workflow conclusion is ${conclusion}`);
                core.setOutput('skip', 'true');
                return;
              }
              
              // ✅ 直接用 head_branch 作为分支名
              branchName = headBranch;
              
              // ✅ 用 Search API 获取 PR 号
              try {
                const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} type:pr state:open head:${headBranch}`
                });
                
                if (searchResult.total_count > 0) {
                  prNumber = searchResult.items[0].number;
                  console.log(`Found PR #${prNumber} for branch ${headBranch}`);
                }
              } catch (error) {
                console.log(`Search API failed: ${error.message}`);
              }
              
              // 如果找不到 PR 号，用分支名继续（Get Review Comments 会处理）
              if (!prNumber) {
                console.log(`No PR found, using branch ${headBranch}`);
                // 尝试从分支名推断 PR（如果是 test/xxx 格式）
                prNumber = null;  // 后面步骤会处理
              }
            }
            // ✅ workflow_dispatch 手动触发
            else if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
              if (!prNumber) {
                core.setFailed('PR number is required');
                return;
              }
              console.log(`Manual trigger for PR #${prNumber}`);
            }
            
            core.setOutput('pr_number', prNumber);
            core.setOutput('branch', branchName);
            core.setOutput('skip', 'false');
      
      # ✅ Checkout PR 分支（而不是 main）
      - name: Checkout PR Branch
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-pr-info.outputs.branch != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-pr-info.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # ✅ 如果没有分支名，用 github.head_ref（fallback）
      - name: Checkout (Fallback)
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-pr-info.outputs.branch == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install claude-agent-sdk
      
      - name: Configure Git for Auto-Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Get PR Review Comments
        id: get-comments
        if: steps.get-pr-info.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          BRANCH_NAME: ${{ steps.get-pr-info.outputs.branch }}
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = parseInt(process.env.PR_NUMBER || '0');
            const branchName = process.env.BRANCH_NAME;
            
            // ✅ 如果 PR 号为空，尝试从分支名获取
            if (!prNumber && branchName) {
              console.log(`PR number not found, trying to get from branch ${branchName}...`);
              try {
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${branchName}`,
                  state: 'open'
                });
                
                if (prs.length > 0) {
                  prNumber = prs[0].number;
                  console.log(`Found PR #${prNumber} for branch ${branchName}`);
                }
              } catch (error) {
                console.log(`Failed to get PR from branch: ${error.message}`);
              }
            }
            
            if (!prNumber) {
              console.log('No PR number available, skipping');
              core.setOutput('skip', 'true');
              return;
            }
            
            console.log(`Fetching review comments for PR #${prNumber}`);
            
            // ✅ 使用正确的 API 获取代码行上的审查评论
            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            console.log(`Found ${comments.length} review comments`);
            
            // ✅ 直接使用 API 返回的字段，不用正则解析
            const reviewComments = comments
              .filter(c => c.user.login === 'github-actions[bot]')
              .filter(c => c.body.includes('[qwen-review]'))
              .map(c => {
                // 清理评论 body，提取问题描述
                const body = c.body
                  .replace(/\*\*\[qwen-review\]\*\*.*?<br>/, '')
                  .replace(/<sub>.*?<\/sub>/, '')
                  .replace(/<!--.*?-->/, '')
                  .trim()
                  .split('\n')[0];
                
                return {
                  location: {
                    path: c.path,  // ✅ 直接使用 path 字段
                    range: { start: { line: c.line } }  // ✅ 直接使用 line 字段
                  },
                  message: body || 'Code issue detected',
                  severity: 'warning'
                };
              });
            
            console.log(`Filtered to ${reviewComments.length} qwen-review comments`);
            
            // 调试输出
            if (reviewComments.length > 0) {
              console.log('Sample comment:', JSON.stringify(reviewComments[0], null, 2));
            }
            
            core.setOutput('comments', JSON.stringify(reviewComments));
            core.setOutput('count', reviewComments.length);
            core.setOutput('skip', 'false');
      
      - name: Check if Review Found Issues
        id: check-issues
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-comments.outputs.skip != 'true'
        env:
          COMMENT_COUNT: ${{ steps.get-comments.outputs.count }}
        uses: actions/github-script@v7
        with:
          script: |
            const count = parseInt(process.env.COMMENT_COUNT || '0');
            
            if (count === 0) {
              console.log('✅ No review issues found, skipping auto-fix');
              core.setOutput('skip', 'true');
            } else {
              console.log(`🐛 Found ${count} issues to fix`);
              core.setOutput('skip', 'false');
            }
      
      - name: Add Comment (No Issues)
        if: steps.check-issues.outputs.skip == 'true' && steps.get-pr-info.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '## ✅ AI Review Complete\\n\\nNo issues found. Great job! 🎉'
            });
      
      - name: Run AI Auto-Fix
        if: steps.check-issues.outputs.skip != 'true'
        id: auto-fix
        continue-on-error: true
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://coding.dashscope.aliyuncs.com/apps/anthropic' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'qwen3.5-plus' }}
          REVIEW_COMMENTS: ${{ steps.get-comments.outputs.comments }}
          MAX_FIX_FILES: ${{ github.event.inputs.max_files || '3' }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
        run: |
          echo "🤖 Running AI Auto-Fix for PR #${{ steps.get-pr-info.outputs.pr_number }}..."
          echo "Review comments count: ${{ steps.get-comments.outputs.count }}"
          # 只捕获 stdout 到 JSON 文件，stderr 正常显示
          python3 scripts/auto-fix.py > auto-fix-result.json || echo '{"success": false, "error": "Script failed"}' > auto-fix-result.json
          echo "=== Auto-fix output ==="
          cat auto-fix-result.json
          echo "======================="
      
      - name: Check if Fixes Applied
        id: check-fixes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              const content = fs.readFileSync('auto-fix-result.json', 'utf8').trim();
              console.log('Raw output:', content);
              
              if (!content) {
                console.log('Empty output file');
                core.setOutput('has-fixes', 'false');
                return;
              }
              
              const result = JSON.parse(content);
              
              if (result.success && result.fixed_files && result.fixed_files.length > 0) {
                console.log(`✅ AI fixed ${result.fixed_files.length} file(s): ${result.fixed_files.join(', ')}`);
                core.setOutput('has-fixes', 'true');
                core.setOutput('fixed-files', result.fixed_files.join(', '));
              } else {
                console.log('ℹ️ No fixes applied');
                core.setOutput('has-fixes', 'false');
              }
            } catch (e) {
              console.log('Error parsing result:', e.message);
              core.setOutput('has-fixes', 'false');
            }
      
      - name: Commit and Push Fixes
        if: steps.check-fixes.outputs.has-fixes == 'true' && steps.get-pr-info.outputs.skip != 'true'
        env:
          TARGET_BRANCH: ${{ steps.get-pr-info.outputs.branch || steps.get-branch-manual.outputs.branch }}
        run: |
          echo "📝 Committing fixes..."
          
          git add -A
          
          # 移除 auto-fix-result.json（临时文件，不应该提交）
          git reset auto-fix-result.json 2>/dev/null || true
          rm -f auto-fix-result.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "🤖 AI auto-fix: ${{ steps.check-fixes.outputs.fixed-files }}"
          
          echo "🚀 Pushing fixes to PR..."
          echo "Target branch: $TARGET_BRANCH"
          git push origin HEAD:$TARGET_BRANCH
          
          echo "✅ Fixes pushed successfully!"
      
      - name: Add Comment to PR
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          HAS_FIXES: ${{ steps.check-fixes.outputs.has-fixes }}
          FIXED_FILES: ${{ steps.check-fixes.outputs.fixed-files }}
          COMMENT_COUNT: ${{ steps.get-comments.outputs.count }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            if (!prNumber) {
              console.log('No PR number, skipping comment');
              return;
            }
            const hasFixes = process.env.HAS_FIXES === 'true';
            const fixedFiles = process.env.FIXED_FILES || '';
            const commentCount = parseInt(process.env.COMMENT_COUNT || '0');
            
            let comment = '';
            
            if (hasFixes) {
              comment = `## 🤖 AI Auto-Fix Complete\n\n✅ Successfully fixed **${fixedFiles}**\n\nThe fixes have been pushed to this PR. Workflow will re-run automatically.`;
            } else {
              if (commentCount === 0) {
                comment = `## ℹ️ AI Auto-Fix Skipped\n\nNo review comments found to fix.`;
              } else {
                comment = `## ⚠️ AI Auto-Fix Failed\n\nAI was unable to automatically fix the identified issues. Please review and fix manually.`;
              }
            }
            
            if (prNumber) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: comment
              });
            } else {
              console.log('No PR number, skipping comment');
            }
