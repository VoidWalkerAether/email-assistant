name: Risk Policy Gate

on:
  pull_request:
    branches: [main]

jobs:
  risk-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Tests
        run: |
          echo "🧪 Running tests..."
          pip install pytest
          pytest tests/ || echo "⚠️ No tests found or tests failed"
      
      - name: Run Lint
        run: |
          echo "🔍 Running lint..."
          pip install flake8
          flake8 src/ --max-line-length=100
      
      - name: Verify Review SHA
        id: sha-check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const headSha = context.payload.pull_request.head.sha;

            // Find the latest review-status comment from github-actions[bot]
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            let latestMarkerSha = null;
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]'
                  && c.body.includes('<!-- review-status -->')) {
                const match = c.body.match(/sha:([a-f0-9]+)/);
                if (match) {
                  latestMarkerSha = match[1];
                  break;
                }
              }
            }

            if (!latestMarkerSha) {
              core.setFailed(
                'SHA Discipline: No AI review marker found. Run the Claude AI Code Review workflow first.'
              );
            } else if (latestMarkerSha !== headSha) {
              core.setFailed(
                `SHA Discipline: Review was done on ${latestMarkerSha.slice(0, 7)} but current HEAD is ${headSha.slice(0, 7)}. New code has been pushed. Re-run AI review.`
              );
            } else {
              console.log(`SHA match: review and HEAD both ${headSha.slice(0, 7)}`);
            }

      - name: Check Risk Tier
        id: risk
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const contract = JSON.parse(fs.readFileSync('harness/risk-contract.json', 'utf8'));
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const changedFiles = files.map(f => f.filename);
            let riskTier = 'low';
            
            // 路径匹配函数
            function matchesPattern(filePath, pattern) {
              if (pattern.endsWith('/**')) {
                const prefix = pattern.slice(0, -3);
                return filePath.startsWith(prefix);
              }
              if (pattern.includes('*')) {
                const regex = new RegExp('^' + pattern.replace(/\*/g, '.*') + '$');
                return regex.test(filePath);
              }
              return filePath === pattern;
            }
            
            // 检查 High Risk
            for (const pattern of contract.riskTierRules.high) {
              if (changedFiles.some(f => matchesPattern(f, pattern))) {
                riskTier = 'high';
                break;
              }
            }
            
            // 检查 Medium Risk
            if (riskTier === 'low') {
              for (const pattern of contract.riskTierRules.medium) {
                if (changedFiles.some(f => matchesPattern(f, pattern))) {
                  riskTier = 'medium';
                  break;
                }
              }
            }
            
            core.setOutput('riskTier', riskTier);
            console.log(`\n📊 Risk Assessment:`);
            console.log(`Risk Tier: ${riskTier.toUpperCase()}`);
            console.log(`Changed files: ${changedFiles.join(', ')}`);
      
      - name: Enforce Risk Policy
        run: |
          RISK_TIER="${{ steps.risk.outputs.riskTier }}"
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Risk Policy Enforcement"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ "$RISK_TIER" = "high" ]; then
            echo "❌ HIGH RISK: Changes require AI code review + manual approval"
            echo ""
            echo "Required checks:"
            echo "  ✅ risk-policy-gate"
            echo "  ⏳ AI code review (add 'ai-reviewed' label)"
            echo "  ⏳ Maintainer approval"
            echo ""
            echo "Please request review from maintainer."
            exit 1
          fi
          
          if [ "$RISK_TIER" = "medium" ]; then
            echo "⚠️  MEDIUM RISK: Tests must pass"
            echo ""
            echo "Required checks:"
            echo "  ✅ risk-policy-gate"
            echo "  ✅ Tests"
          fi
          
          if [ "$RISK_TIER" = "low" ]; then
            echo "✅ LOW RISK: Standard checks passed"
            echo ""
            echo "Required checks:"
            echo "  ✅ risk-policy-gate"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
