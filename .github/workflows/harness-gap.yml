name: Harness Gap — Bug to Test

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  harness-gap:
    if: github.event.label.name == 'harness-gap'
    runs-on: ubuntu-latest

    steps:
      - name: Check if already handled
        id: check-dedup
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const marker = `<!-- harness-gap-handled -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 50
            });
            const alreadyHandled = comments.some(c => c.body.includes(marker));
            if (alreadyHandled) {
              console.log('Issue already handled, skipping');
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('skip', 'false');

      - name: Checkout main branch
        if: steps.check-dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDK
        run: pip install claude-agent-sdk

      - name: Generate Test Case
        if: steps.check-dedup.outputs.skip != 'true'
        id: generate
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://coding.dashscope.aliyuncs.com/apps/anthropic' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'qwen3.5-plus' }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          AFFECTED_FILE: ${{ github.event.issue.body }}
          BUG_DESCRIPTION: ${{ github.event.issue.body }}
          REPRODUCTION_STEPS: ${{ github.event.issue.body }}
          EXPECTED_BEHAVIOR: ${{ github.event.issue.body }}
        run: |
          python3 scripts/harness-gap.py > harness-gap-result.json || true
          cat harness-gap-result.json 2>/dev/null || echo '{"success": false}' > harness-gap-result.json

      - name: Commit and Create PR
        if: steps.check-dedup.outputs.skip != 'true'
        id: create-pr
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('harness-gap-result.json', 'utf8').trim();
            const result = JSON.parse(content);
            console.log('harness-gap result:', JSON.stringify(result));

            if (!result.success || !result.test_file) {
              console.log('Test generation failed, skipping PR creation');
              return;
            }

            const testFile = result.test_file;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const branchName = `harness-gap/issue-${issueNumber}`;

            // Create branch
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: ref.object.sha
            });
            console.log(`Created branch ${branchName}`);

            // Commit the test file
            const fileContent = fs.readFileSync(testFile, 'utf8');
            const { data: blob } = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: Buffer.from(fileContent).toString('base64'),
              encoding: 'base64'
            });

            await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: ref.object.sha,
              tree: [{
                path: testFile,
                mode: '100644',
                type: 'blob',
                sha: blob.sha
              }]
            });

            // Push commit
            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `test: add regression test for issue #${issueNumber}\n\n${issueTitle}`,
              tree: (await github.rest.git.getTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tree_sha: ref.object.sha,
                recursive: true
              })).data.sha,
              parents: [ref.object.sha]
            });

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branchName}`,
              sha: newCommit.sha
            });
            console.log(`Pushed commit to ${branchName}`);

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[harness-gap] Add regression test for issue #${issueNumber}`,
              head: branchName,
              base: 'main',
              body: `## Harness Gap: Issue #${issueNumber}

自动生成的回归测试，用于复现 issue #${issueNumber} 中描述的缺陷。

### Issue 描述
${issueTitle}

### 复现步骤
（详见 issue #${issueNumber}）

### 生成的测试文件
- \`${testFile}\`

---
<!-- harness-gap-auto-pr -->
`
            });
            console.log(`Created PR #${pr.number}`);

            // Add marker comment to issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `<!-- harness-gap-handled -->\n✅ 已自动生成回归测试：PR #${pr.number}\n\n请检查生成的测试是否正确复现了缺陷。如果测试通过，请合并 PR 并关闭此 issue。`
            });

            core.setOutput('pr_number', pr.number);
