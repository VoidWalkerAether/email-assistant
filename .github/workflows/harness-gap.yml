name: Harness Gap — Bug to Test

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  harness-gap:
    if: github.event.label.name == 'harness-gap'
    runs-on: ubuntu-latest

    steps:
      - name: Check if already handled
        id: check-dedup
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const marker = `<!-- harness-gap-handled -->`;

            // Check for existing PR from harness-gap bot
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:harness-gap/issue-${issueNumber}`
            });
            if (prs.length > 0) {
              console.log(`Existing PR #${prs[0].number} found, skipping`);
              core.setOutput('skip', 'true');
              return;
            }

            // Check for marker comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 50
            });
            const alreadyHandled = comments.some(c => c.body.includes(marker));
            if (alreadyHandled) {
              console.log('Issue already handled, skipping');
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('skip', 'false');

      - name: Checkout main branch
        if: steps.check-dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDK
        run: pip install claude-agent-sdk

      - name: Parse Issue Body
        if: steps.check-dedup.outputs.skip != 'true'
        id: parse
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const body = process.env.ISSUE_BODY || '';
            const lines = body.split('\n');

            function extractField(startMarker, endMarkers) {
              let start = -1;
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes(startMarker)) { start = i; break; }
              }
              if (start === -1) return '';
              let end = lines.length;
              for (const m of endMarkers) {
                for (let i = start + 1; i < lines.length; i++) {
                  if (lines[i].includes(m)) { end = i; break; }
                }
                if (end < lines.length) break;
              }
              return lines.slice(start + 1, end).join('\n').trim();
            }

            const affectedFile = extractField('受影响的文件', ['## 缺陷描述', '##']);
            const bugDescription = extractField('缺陷描述', ['## 复现步骤', '##']);
            const reproductionSteps = extractField('复现步骤', ['## 期望行为', '##']);
            const expectedBehavior = extractField('期望行为', ['##']);

            console.log('Affected file:', affectedFile);
            console.log('Bug description:', bugDescription);

            core.setOutput('issue_number', context.payload.issue.number);
            core.setOutput('issue_title', process.env.ISSUE_TITLE);
            core.setOutput('affected_file', affectedFile);
            core.setOutput('bug_description', bugDescription);
            core.setOutput('reproduction_steps', reproductionSteps);
            core.setOutput('expected_behavior', expectedBehavior);

      - name: Generate Test Case
        if: steps.check-dedup.outputs.skip != 'true'
        id: generate
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://coding.dashscope.aliyuncs.com/apps/anthropic' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'qwen3.5-plus' }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.parse.outputs.issue_title }}
          AFFECTED_FILE: ${{ steps.parse.outputs.affected_file }}
          BUG_DESCRIPTION: ${{ steps.parse.outputs.bug_description }}
          REPRODUCTION_STEPS: ${{ steps.parse.outputs.reproduction_steps }}
          EXPECTED_BEHAVIOR: ${{ steps.parse.outputs.expected_behavior }}
        run: |
          python3 scripts/harness-gap.py > harness-gap-result.json || true
          cat harness-gap-result.json 2>/dev/null || echo '{"success": false}' > harness-gap-result.json

      - name: Commit and Create PR
        if: steps.check-dedup.outputs.skip != 'true'
        id: create-pr
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('harness-gap-result.json', 'utf8').trim();
            const result = JSON.parse(content);
            console.log('harness-gap result:', JSON.stringify(result));

            if (!result.success || !result.test_file) {
              console.log('Test generation failed, skipping PR creation');
              return;
            }

            const testFile = result.test_file;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const branchName = `harness-gap/issue-${issueNumber}`;

            // Create branch (delete existing if any)
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
              console.log(`Deleted existing branch ${branchName}`);
            } catch (e) {
              // Branch doesn't exist yet, that's fine
            }
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            const mainCommitSha = ref.object.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: mainCommitSha
            });
            console.log(`Created branch ${branchName} from ${mainCommitSha.slice(0, 7)}`);

            // Get the tree SHA from the latest commit on main
            const { data: latestCommit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: mainCommitSha
            });
            const mainTreeSha = latestCommit.tree.sha;
            console.log(`Main tree SHA: ${mainTreeSha}`);

            // Create blob for the test file
            const fileContent = fs.readFileSync(testFile, 'utf8');
            const { data: blob } = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: Buffer.from(fileContent).toString('base64'),
              encoding: 'base64'
            });

            // Create new tree with the test file added
            const { data: newTree } = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: mainTreeSha,
              tree: [{
                path: testFile,
                mode: '100644',
                type: 'blob',
                sha: blob.sha
              }]
            });

            // Create commit
            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `test: add regression test for issue #${issueNumber}\n\n${issueTitle}`,
              tree: newTree.sha,
              parents: [mainCommitSha]
            });
            console.log(`Created commit ${newCommit.sha.slice(0, 7)}`);

            // Update branch to point to new commit
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branchName}`,
              sha: newCommit.sha
            });

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[harness-gap] Add regression test for issue #${issueNumber}`,
              head: branchName,
              base: 'main',
              body: `## Harness Gap: Issue #${issueNumber}\n\n自动生成的回归测试，用于复现 issue #${issueNumber} 中描述的缺陷。\n\n### Issue 描述\n${issueTitle}\n\n### 复现步骤\n（详见 issue #${issueNumber}）\n\n### 生成的测试文件\n- \`${testFile}\`\n\n---\n<!-- harness-gap-auto-pr -->`
            });
            console.log(`Created PR #${pr.number}`);

            // Add marker comment to issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `<!-- harness-gap-handled -->\n✅ 已自动生成回归测试：PR #${pr.number}\n\n请检查生成的测试是否正确复现了缺陷。如果测试通过，请合并 PR 并关闭此 issue。`
            });

            core.setOutput('pr_number', pr.number);
