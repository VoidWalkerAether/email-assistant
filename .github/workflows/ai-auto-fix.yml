name: AI Auto-Remediation

on:
  workflow_run:
    workflows: ["Claude AI Code Review"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to fix'
        required: true
        default: ''
      max_files:
        description: 'Maximum files to fix (default: 3)'
        required: false
        default: '3'

permissions:
  pull-requests: write
  contents: write
  issues: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Resolve PR number from workflow_run event
      - name: Get PR Info
        id: get-pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            let branchName = null;
            let skipAuto = 'false';

            if (context.eventName === 'workflow_run') {
              const conclusion = context.payload.workflow_run.conclusion;
              const headBranch = context.payload.workflow_run.head_branch;

              console.log(`Triggered by workflow_run (${conclusion})`);
              console.log(`Head Branch: ${headBranch}`);

              // Skip main branch runs
              if (headBranch === 'main' || !headBranch) {
                console.log(`Skipping: head_branch is '${headBranch}'`);
                skipAuto = 'true';
                core.setOutput('skip', skipAuto);
                return;
              }

              if (conclusion !== 'success') {
                console.log(`Skipping: workflow conclusion is ${conclusion}`);
                skipAuto = 'true';
                core.setOutput('skip', skipAuto);
                return;
              }

              branchName = headBranch;

              try {
                const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} type:pr state:open head:${headBranch}`,
                  per_page: 1
                });
                if (searchResult.total_count > 0) {
                  prNumber = searchResult.items[0].number;
                  console.log(`Found PR #${prNumber} for branch ${headBranch}`);
                }
              } catch (error) {
                console.log(`Search API failed: ${error.message}`);
              }

              if (!prNumber) {
                console.log(`No PR found, using branch ${headBranch}`);
                skipAuto = 'true';
                core.setOutput('skip', skipAuto);
                return;
              }
            }
            else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number);
              console.log(`Manual trigger for PR #${prNumber}`);
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('branch', branchName);
            core.setOutput('skip', skipAuto);

      # Step 2: Checkout the PR branch
      - name: Checkout PR Branch
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-pr-info.outputs.branch != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-pr-info.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install claude-agent-sdk

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 3: Fetch review comments from PR
      - name: Get Review Comments
        id: get-comments
        if: steps.get-pr-info.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
          BRANCH_NAME: ${{ steps.get-pr-info.outputs.branch }}
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = parseInt(process.env.PR_NUMBER || '0');
            const branchName = process.env.BRANCH_NAME;

            // Fallback: try to find PR by branch name
            if (!prNumber && branchName) {
              try {
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${branchName}`,
                  state: 'open'
                });
                if (prs.length > 0) {
                  prNumber = prs[0].number;
                  console.log(`Found PR #${prNumber} for branch ${branchName}`);
                }
              } catch (error) {
                console.log(`Failed to get PR from branch: ${error.message}`);
              }
            }

            if (!prNumber) {
              console.log('No PR number available, skipping');
              core.setOutput('skip', 'true');
              return;
            }

            console.log(`Fetching review comments for PR #${prNumber}`);

            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`Found ${comments.length} review comments`);

            // Debug: dump first comment structure
            if (comments.length > 0) {
              const c = comments[0];
              console.log('Sample comment:');
              console.log(JSON.stringify({
                id: c.id,
                user: c.user && c.user.login,
                path: c.path,
                line: c.line,
                body_preview: (c.body || '').substring(0, 150)
              }, null, 2));
            }

            // Filter: keep only bot comments that have path and line
            const reviewComments = comments
              .filter(c => c.user && c.user.login === 'github-actions[bot]')
              .filter(c => c.path !== undefined && c.path !== null && c.line !== undefined && c.line !== null)
              .map(c => {
                const body = (c.body || '')
                  .replace(/\*\*\[.*?\]\*\*.*?<br>/, '')
                  .replace(/<sub>.*?<\/sub>/, '')
                  .replace(/<details>.*?<\/details>/gs, '')
                  .replace(/<!--.*?-->/, '')
                  .trim()
                  .split('\n')[0];

                return {
                  location: {
                    path: c.path,
                    range: { start: { line: c.line } }
                  },
                  message: body || 'Code issue detected',
                  severity: 'warning'
                };
              });

            console.log(`Matched: ${reviewComments.length} bot review comments`);
            if (reviewComments.length > 0) {
              console.log('First matched:', JSON.stringify(reviewComments[0], null, 2));
            }

            core.setOutput('comments', JSON.stringify(reviewComments));
            core.setOutput('count', reviewComments.length);
            core.setOutput('skip', 'false');

      # Step 4: Check if there are issues to fix
      - name: Check if Review Found Issues
        id: check-issues
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-comments.outputs.skip != 'true'
        env:
          COMMENT_COUNT: ${{ steps.get-comments.outputs.count }}
        uses: actions/github-script@v7
        with:
          script: |
            const count = parseInt(process.env.COMMENT_COUNT || '0');
            if (count === 0) {
              console.log('No review issues found, skipping auto-fix');
              core.setOutput('skip', 'true');
            } else {
              console.log(`Found ${count} issues to fix`);
              core.setOutput('skip', 'false');
            }

      # Step 5: Run AI auto-fix
      - name: Run AI Auto-Fix
        if: steps.check-issues.outputs.skip != 'true'
        id: auto-fix
        continue-on-error: true
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://coding.dashscope.aliyuncs.com/apps/anthropic' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'qwen3.5-plus' }}
          REVIEW_COMMENTS: ${{ steps.get-comments.outputs.comments }}
          MAX_FIX_FILES: ${{ github.event.inputs.max_files || '3' }}
          PR_NUMBER: ${{ steps.get-pr-info.outputs.pr_number }}
        run: |
          echo "Running AI Auto-Fix for PR #${{ steps.get-pr-info.outputs.pr_number }}..."
          echo "Review comments count: ${{ steps.get-comments.outputs.count }}"
          python3 scripts/auto-fix.py > auto-fix-result.json 2>&1 || true
          echo "=== Auto-fix output ==="
          cat auto-fix-result.json 2>/dev/null || echo '{"success": false}' > auto-fix-result.json

      # Step 6: Check if fixes were applied
      - name: Check if Fixes Applied
        id: check-fixes
        if: steps.get-pr-info.outputs.skip != 'true' && steps.get-comments.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const content = fs.readFileSync('auto-fix-result.json', 'utf8').trim();
              console.log('Raw output:', content);
              const result = JSON.parse(content);
              if (result.success && result.fixed_files && result.fixed_files.length > 0) {
                console.log(`AI fixed ${result.fixed_files.length} file(s)`);
                core.setOutput('has_fixes', 'true');
                core.setOutput('fixed_files', result.fixed_files.join(', '));
              } else {
                console.log('No fixes applied');
                core.setOutput('has_fixes', 'false');
              }
            } catch (e) {
              console.log('Error parsing result:', e.message);
              core.setOutput('has_fixes', 'false');
            }

      # Step 7: Commit and push fixes
      - name: Commit and Push Fixes
        if: steps.check-fixes.outputs.has_fixes == 'true'
        env:
          TARGET_BRANCH: ${{ steps.get-pr-info.outputs.branch }}
        run: |
          echo "Committing fixes..."
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "AI auto-fix: ${{ steps.check-fixes.outputs.fixed_files }}"
          echo "Pushing fixes to PR..."
          git push origin HEAD:$TARGET_BRANCH
